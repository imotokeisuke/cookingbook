<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>わたしたちの料理帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F0E8; }
    body { font-family: 'Zen Maru Gothic', sans-serif; }
    #root { min-height: 100vh; }
    input, textarea, button { font-family: 'Zen Maru Gothic', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #DDD0BC; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Firebase Realtime Database (REST API) ────────────────────
const DB = "https://push-up-record-default-rtdb.asia-southeast1.firebasedatabase.app";

function subscribeRecords(callback) {
  const src = new EventSource(`${DB}/records.json`);
  const refresh = () =>
    fetch(`${DB}/records.json`)
      .then(r => r.json())
      .then(val => callback(val ? Object.values(val).sort((a,b)=>a.id-b.id) : []));
  src.addEventListener("put",   refresh);
  src.addEventListener("patch", refresh);
  src.onerror = () => {};
  refresh();
  return () => src.close();
}
const saveRecord   = entry => fetch(`${DB}/records/${entry.id}.json`, { method:"PUT",  headers:{"Content-Type":"application/json"}, body:JSON.stringify(entry) });
const deleteRecord = id    => fetch(`${DB}/records/${id}.json`,        { method:"DELETE" });

// ── カラー（アースカラー）────────────────────────────────────
const C = {
  bg:          "#F5F0E8",
  card:        "#FDFAF5",
  accent:      "#A07850",
  accentDeep:  "#7A5C38",
  accentLight: "#EDE4D4",
  text:        "#3A2E22",
  muted:       "#8C7A62",
  border:      "#DDD0BC",
  tabBg:       "#EDE4D4",
  star:        "#C8903A",
  starOff:     "#D9CCBA",
  danger:      "#C0522A",
};

// ── ユーティリティ ───────────────────────────────────────────
const toDateStr = d => d.toISOString().split("T")[0];
const fmtDate   = s => s ? new Date(s+"T00:00:00").toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"}) : "";
const WLABELS   = ["月","火","水","木","金","土","日"];

function getWeekDays(ref) {
  const d = new Date(ref+"T00:00:00"), dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow===0 ? 6 : dow-1));
  return Array.from({length:7}, (_,i) => { const x=new Date(mon); x.setDate(mon.getDate()+i); return toDateStr(x); });
}

// ── 小コンポーネント ─────────────────────────────────────────
function StarRow({ value, onChange, size=28 }) {
  return (
    <div style={{display:"flex",gap:6}}>
      {[1,2,3,4,5].map(n => (
        <span key={n} onClick={()=>onChange&&onChange(n)} style={{
          fontSize:size, cursor:onChange?"pointer":"default",
          color:n<=value?C.star:C.starOff,
          display:"inline-block", transition:"transform 0.1s",
          transform:(onChange&&n<=value)?"scale(1.18)":"scale(1)", userSelect:"none",
        }}>★</span>
      ))}
    </div>
  );
}

function PhotoBox({ src, onClick }) {
  return (
    <div onClick={onClick} style={{
      width:"100%", height:190, borderRadius:18,
      background:src?"transparent":C.accentLight,
      border:`2px dashed ${C.border}`,
      display:"flex", alignItems:"center", justifyContent:"center",
      cursor:"pointer", overflow:"hidden",
    }}>
      {src
        ? <img src={src} alt="料理" style={{width:"100%",height:"100%",objectFit:"cover"}} />
        : <div style={{color:C.muted,textAlign:"center"}}>
            <div style={{fontSize:40}}>📷</div>
            <div style={{fontSize:13,marginTop:8}}>タップして写真を追加</div>
          </div>
      }
    </div>
  );
}

// ── メインアプリ ─────────────────────────────────────────────
function App() {
  const [tab,       setTab]       = useState("calendar");
  const [records,   setRecords]   = useState([]);
  const [loaded,    setLoaded]    = useState(false);
  const [weekRef,   setWeekRef]   = useState(toDateStr(new Date()));
  const [search,    setSearch]    = useState("");
  const [detailId,  setDetailId]  = useState(null);
  const [toast,     setToast]     = useState("");
  const [confirmDel,setConfirmDel]= useState(false);
  const emptyForm = {date:toDateStr(new Date()),photo:null,name:"",rating:3,comment:""};
  const [form, setForm] = useState(emptyForm);
  const fileRef = useRef();

  useEffect(() => {
    const unsub = subscribeRecords(arr => { setRecords(arr); setLoaded(true); });
    return unsub;
  }, []);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),2400); };

  const handleSubmit = async () => {
    if (!form.name.trim()) return;
    const entry = {id:Date.now().toString(), ...form};
    await saveRecord(entry);
    setForm(emptyForm);
    showToast("記録しました 🌿");
    setDetailId(entry.id);
    setTab("zukan");
  };

  const handleDelete = async id => {
    await deleteRecord(id);
    setDetailId(null); setConfirmDel(false);
    showToast("削除しました");
  };

  const handlePhoto = e => {
    const file = e.target.files[0]; if (!file) return;
    const canvas = document.createElement("canvas"), ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
      const MAX=900, scale=Math.min(1,MAX/Math.max(img.width,img.height));
      canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      setForm(f=>({...f,photo:canvas.toDataURL("image/jpeg",0.82)}));
    };
    img.src = URL.createObjectURL(file);
    e.target.value="";
  };

  const handleMadeThis = dish => {
    setForm({date:toDateStr(new Date()),photo:dish.photo,name:dish.name,rating:dish.rating,comment:""});
    setDetailId(null); setTab("record");
  };

  const weekDays = getWeekDays(weekRef);
  const today    = toDateStr(new Date());
  const detail   = records.find(r=>r.id===detailId);
  const filtered = records.slice().reverse().filter(r=>
    r.name.toLowerCase().includes(search.toLowerCase()) ||
    (r.comment||"").toLowerCase().includes(search.toLowerCase())
  );

  const inp = {
    width:"100%", padding:"11px 14px", borderRadius:14,
    border:`1.5px solid ${C.border}`, fontSize:15, color:C.text,
    background:C.bg, outline:"none", fontFamily:"inherit",
  };
  const lbl = {display:"block",fontSize:12,color:C.muted,marginBottom:5,fontWeight:500,letterSpacing:"0.04em"};
  const tabBtn = active => ({
    flex:1, padding:"9px 0", border:"none", borderRadius:24,
    background:active?C.accent:"transparent",
    color:active?"#fff":C.muted, fontWeight:active?700:500,
    fontSize:13, cursor:"pointer", transition:"all 0.2s", fontFamily:"inherit",
  });

  if (!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:C.muted,flexDirection:"column",gap:12}}>
      <div style={{fontSize:36}}>🍽</div>
      <div style={{fontSize:14}}>読み込み中…</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Zen Maru Gothic',sans-serif",background:C.bg,minHeight:"100dvh",maxWidth:480,margin:"0 auto",paddingBottom:32}}>

      {toast && (
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",
          background:C.card,border:`1.5px solid ${C.accent}`,borderRadius:24,
          padding:"10px 24px",fontSize:14,color:C.text,zIndex:200,
          boxShadow:"0 2px 16px rgba(122,92,56,0.18)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* ヘッダー */}
      <div style={{background:C.card,padding:"18px 20px 10px",borderBottom:`1.5px solid ${C.border}`,position:"sticky",top:0,zIndex:10}}>
        <h1 style={{fontSize:20,color:C.text,textAlign:"center",fontWeight:700,letterSpacing:"0.06em"}}>
          🍽 わたしたちの料理帳
        </h1>
        <div style={{display:"flex",background:C.tabBg,borderRadius:28,padding:4,marginTop:12,gap:3}}>
          {[{id:"calendar",icon:"📅",label:"カレンダー"},{id:"zukan",icon:"📖",label:"図鑑"},{id:"record",icon:"✏️",label:"記録"}]
            .map(t => (
              <button key={t.id} style={tabBtn(tab===t.id)} onClick={()=>{
                setTab(t.id); if(t.id!=="zukan") setDetailId(null); setConfirmDel(false);
              }}>
                {t.icon} {t.label}
              </button>
            ))
          }
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>

        {/* ════ カレンダー ════ */}
        {tab==="calendar" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              {[["‹ 前",-7],["次 ›",7]].map(([label,days],i) => (
                <button key={i} onClick={()=>{
                  const d=new Date(weekRef+"T00:00:00"); d.setDate(d.getDate()+days); setWeekRef(toDateStr(d));
                }} style={{background:C.accentLight,border:"none",borderRadius:20,padding:"7px 16px",cursor:"pointer",color:C.accentDeep,fontSize:14,fontFamily:"inherit"}}>
                  {label}
                </button>
              ))}
              <span style={{fontSize:13,color:C.muted,fontWeight:500,order:-1+i}}>
                {new Date(weekDays[0]+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric"})}
                {" 〜 "}
                {new Date(weekDays[6]+"T00:00:00").toLocaleDateString("ja-JP",{month:"long",day:"numeric"})}
              </span>
            </div>

            {weekDays.map((date,i) => {
              const dayRecs = records.filter(r=>r.date===date);
              const isToday = date===today;
              return (
                <div key={date} style={{marginBottom:14,display:"flex",gap:10}}>
                  <div style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:2}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:isToday?C.accent:C.tabBg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:9,color:isToday?"#fff":C.muted,lineHeight:1}}>{WLABELS[i]}</span>
                      <span style={{fontSize:15,fontWeight:700,color:isToday?"#fff":C.text,lineHeight:1.3}}>
                        {new Date(date+"T00:00:00").getDate()}
                      </span>
                    </div>
                    {i<6 && <div style={{width:1.5,flex:1,background:C.border,marginTop:4}} />}
                  </div>
                  <div style={{flex:1,minWidth:0,paddingBottom:4}}>
                    {dayRecs.length===0
                      ? <div style={{height:40,display:"flex",alignItems:"center"}}>
                          <span style={{fontSize:13,color:C.border}}>記録なし</span>
                        </div>
                      : dayRecs.map(r => (
                          <div key={r.id} onClick={()=>{setDetailId(r.id);setTab("zukan");}}
                            style={{background:C.card,borderRadius:16,border:`1.5px solid ${C.border}`,
                              padding:10,display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:8}}>
                            {r.photo
                              ? <img src={r.photo} alt={r.name} style={{width:50,height:50,borderRadius:12,objectFit:"cover",flexShrink:0}} />
                              : <div style={{width:50,height:50,borderRadius:12,background:C.accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🍽</div>
                            }
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:15,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                              <div style={{display:"flex",gap:1,marginTop:3}}>
                                {[1,2,3,4,5].map(n=><span key={n} style={{fontSize:13,color:n<=r.rating?C.star:C.starOff}}>★</span>)}
                              </div>
                            </div>
                            <span style={{fontSize:18,color:C.border}}>›</span>
                          </div>
                        ))
                    }
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ════ 図鑑 ════ */}
        {tab==="zukan" && (
          <div>
            {detail ? (
              <div>
                <button onClick={()=>{setDetailId(null);setConfirmDel(false);}}
                  style={{background:"none",border:"none",color:C.accentDeep,fontSize:15,cursor:"pointer",padding:"0 0 14px",fontFamily:"inherit"}}>
                  ‹ 図鑑に戻る
                </button>
                <div style={{background:C.card,borderRadius:22,border:`1.5px solid ${C.border}`,overflow:"hidden"}}>
                  <div style={{padding:"18px 18px 0"}}>
                    <h2 style={{margin:"0 0 10px",fontSize:22,color:C.text,fontWeight:700}}>{detail.name}</h2>
                    <StarRow value={detail.rating} size={26} />
                    <div style={{fontSize:12,color:C.muted,marginTop:8,marginBottom:14}}>{fmtDate(detail.date)}</div>
                  </div>
                  {detail.photo
                    ? <img src={detail.photo} alt={detail.name} style={{width:"100%",height:230,objectFit:"cover"}} />
                    : <div style={{width:"100%",height:150,background:C.accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:52}}>🍽</div>
                  }
                  <div style={{padding:18}}>
                    {detail.comment
                      ? <p style={{fontSize:15,color:C.text,lineHeight:1.75,margin:"0 0 18px"}}>{detail.comment}</p>
                      : <p style={{fontSize:14,color:C.muted,margin:"0 0 18px"}}>コメントなし</p>
                    }
                    <button onClick={()=>handleMadeThis(detail)} style={{
                      width:"100%",padding:"15px",borderRadius:22,background:C.accent,border:"none",
                      color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.04em",marginBottom:10,
                    }}>🍳 これを作った！</button>
                    {!confirmDel
                      ? <button onClick={()=>setConfirmDel(true)} style={{
                          width:"100%",padding:"11px",borderRadius:22,background:"transparent",
                          border:`1.5px solid ${C.border}`,color:C.muted,fontSize:14,cursor:"pointer",fontFamily:"inherit",
                        }}>🗑 この記録を削除する</button>
                      : <div style={{background:"#FDF0EB",borderRadius:14,padding:14,textAlign:"center"}}>
                          <p style={{fontSize:14,color:C.text,marginBottom:12}}>本当に削除しますか？</p>
                          <div style={{display:"flex",gap:8}}>
                            <button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:"10px",borderRadius:20,background:C.accentLight,border:"none",color:C.text,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>キャンセル</button>
                            <button onClick={()=>handleDelete(detail.id)} style={{flex:1,padding:"10px",borderRadius:20,background:C.danger,border:"none",color:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>削除する</button>
                          </div>
                        </div>
                    }
                  </div>
                </div>
              </div>
            ) : (
              <div>
                <div style={{position:"relative",marginBottom:14}}>
                  <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16}}>🔍</span>
                  <input type="search" placeholder="料理を検索…" value={search}
                    onChange={e=>setSearch(e.target.value)}
                    style={{...inp,paddingLeft:40,borderRadius:22}} />
                </div>
                {filtered.length===0
                  ? <div style={{textAlign:"center",padding:"48px 20px",color:C.muted}}>
                      {records.length===0
                        ? <><div style={{fontSize:48,marginBottom:12}}>🌱</div><div style={{fontSize:14,lineHeight:1.8}}>まだ記録がありません。<br />「記録」タブから追加しましょう！</div></>
                        : <><div style={{fontSize:40}}>🔍</div><div style={{fontSize:14,marginTop:8}}>見つかりませんでした</div></>
                      }
                    </div>
                  : filtered.map(r => (
                      <div key={r.id} onClick={()=>setDetailId(r.id)} style={{
                        background:C.card,borderRadius:18,border:`1.5px solid ${C.border}`,
                        marginBottom:12,cursor:"pointer",overflow:"hidden",
                        display:"flex",alignItems:"center",gap:12,padding:12,
                      }}>
                        {r.photo
                          ? <img src={r.photo} alt={r.name} style={{width:68,height:68,borderRadius:14,objectFit:"cover",flexShrink:0}} />
                          : <div style={{width:68,height:68,borderRadius:14,background:C.accentLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>🍽</div>
                        }
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
                          <div style={{display:"flex",gap:1,margin:"4px 0"}}>
                            {[1,2,3,4,5].map(n=><span key={n} style={{fontSize:15,color:n<=r.rating?C.star:C.starOff}}>★</span>)}
                          </div>
                          {r.comment && <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.comment}</div>}
                        </div>
                        <span style={{fontSize:18,color:C.border,flexShrink:0}}>›</span>
                      </div>
                    ))
                }
              </div>
            )}
          </div>
        )}

        {/* ════ 記録 ════ */}
        {tab==="record" && (
          <div>
            <div style={{background:C.card,borderRadius:22,border:`1.5px solid ${C.border}`,padding:20}}>
              <h2 style={{margin:"0 0 18px",fontSize:17,color:C.text,textAlign:"center",fontWeight:700}}>🌿 料理を記録する</h2>
              <div style={{marginBottom:18}}>
                <PhotoBox src={form.photo} onClick={()=>fileRef.current.click()} />
                <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handlePhoto} />
                {form.photo && (
                  <div style={{textAlign:"center",marginTop:6}}>
                    <button onClick={()=>setForm(f=>({...f,photo:null}))}
                      style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                      写真を削除
                    </button>
                  </div>
                )}
              </div>
              <div style={{marginBottom:16}}>
                <label style={lbl}>料理名 *</label>
                <input type="text" value={form.name} placeholder="例：鶏のから揚げ"
                  onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inp} />
              </div>
              <div style={{marginBottom:16}}>
                <label style={lbl}>日付</label>
                <input type="date" value={form.date}
                  onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp} />
              </div>
              <div style={{marginBottom:18}}>
                <label style={lbl}>評価</label>
                <StarRow value={form.rating} onChange={n=>setForm(f=>({...f,rating:n}))} size={32} />
              </div>
              <div style={{marginBottom:22}}>
                <label style={lbl}>コメント</label>
                <textarea value={form.comment} rows={3} placeholder="味の感想や次回へのメモなど…"
                  onChange={e=>setForm(f=>({...f,comment:e.target.value}))}
                  style={{...inp,resize:"vertical",lineHeight:1.7}} />
              </div>
              <button onClick={handleSubmit} disabled={!form.name.trim()} style={{
                width:"100%",padding:"15px",borderRadius:22,border:"none",
                background:form.name.trim()?C.accent:C.border,
                color:form.name.trim()?"#fff":C.muted,
                fontSize:16,fontWeight:700,
                cursor:form.name.trim()?"pointer":"default",
                fontFamily:"inherit",letterSpacing:"0.04em",transition:"background 0.2s",
              }}>
                🌿 記録する
              </button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
